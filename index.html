<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小财神自我介绍 - 完整有声版</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(145deg, #0a0e27 0%, #1a1f4e 40%, #0d1b3e 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .container {
    width: 100%;
    max-width: 400px;
    height: 100vh;
    max-height: 750px;
    background: linear-gradient(180deg, #0d1233 0%, #151b4a 50%, #0d1233 100%);
    border-radius: 0;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 0 80px rgba(100,140,255,0.05);
    position: relative;
    overflow: hidden;
  }
  @media (min-width: 420px) {
    .container { border-radius: 30px; height: 640px; }
  }

  .stars { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
  .star {
    position: absolute; width: 2px; height: 2px; background: #fff;
    border-radius: 50%; animation: twinkle var(--dur) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.2; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1.2); }
  }

  .glow-top {
    position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
    width: 400px; height: 300px;
    background: radial-gradient(ellipse, rgba(80,140,255,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .glow-bot {
    position: absolute; bottom: -80px; left: 50%; transform: translateX(-50%);
    width: 350px; height: 250px;
    background: radial-gradient(ellipse, rgba(100,200,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .avatar-section {
    position: absolute; top: 8%; left: 50%; transform: translateX(-50%);
    text-align: center; z-index: 2;
  }

  .avatar-ring {
    width: 110px; height: 110px; border-radius: 50%;
    background: conic-gradient(from 0deg, #4f8cff, #7f5af0, #4f8cff, #7f5af0, #4f8cff);
    padding: 3px; animation: spin-ring 4s linear infinite; margin: 0 auto;
  }
  @keyframes spin-ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  .avatar-inner {
    width: 100%; height: 100%; border-radius: 50%; background: #0d1233;
    display: flex; align-items: center; justify-content: center; font-size: 44px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .avatar-inner .emoji { animation: pulse-glow 2s ease-in-out infinite; }
  @keyframes pulse-glow {
    0%,100% { filter: drop-shadow(0 0 8px rgba(100,180,255,0.3)); }
    50% { filter: drop-shadow(0 0 20px rgba(100,180,255,0.8)); }
  }

  .title {
    margin-top: 14px; color: #e8eeff; font-size: 22px; font-weight: 700;
    letter-spacing: 3px; text-shadow: 0 0 20px rgba(100,160,255,0.3);
  }
  .subtitle {
    color: rgba(180,200,255,0.6); font-size: 12px; margin-top: 4px; letter-spacing: 2px;
  }

  .subtitle-area {
    position: absolute; top: 36%; left: 0; right: 0; padding: 0 24px;
    z-index: 2; height: 42%; display: flex; flex-direction: column;
    justify-content: center;
  }

  .line {
    margin-bottom: 4px; opacity: 0; transform: translateY(20px);
    transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    color: rgba(220,235,255,0.9); font-size: 17px; line-height: 1.6;
    text-align: center; font-weight: 500;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    padding: 5px 10px; border-radius: 8px;
  }
  .line.active { opacity: 1; transform: translateY(0); }
  .line.highlight { color: #ffd866; font-size: 18px; font-weight: 700; }

  .progress-bar {
    position: absolute; bottom: 18%; left: 40px; right: 40px; height: 4px;
    background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; z-index: 2;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #4f8cff, #7f5af0, #4f8cff);
    background-size: 200% 100%;
    animation: progress-shimmer 2s linear infinite;
    border-radius: 2px; transition: width 0.1s linear;
  }
  @keyframes progress-shimmer {
    0% { background-position: 0% 0%; }
    100% { background-position: 200% 0%; }
  }

  .controls {
    position: absolute; bottom: 7%; left: 0; right: 0; text-align: center; z-index: 2;
  }
  .play-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 28px;
    border: 1px solid rgba(100,160,255,0.3);
    border-radius: 25px; background: rgba(255,255,255,0.05);
    color: rgba(200,220,255,0.8); font-size: 14px;
    backdrop-filter: blur(10px); cursor: pointer; transition: all 0.3s; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .play-btn:active { background: rgba(100,160,255,0.15); }
  .play-btn .btn-icon { font-size: 18px; }

  .particle {
    position: absolute; width: 3px; height: 3px;
    background: rgba(100,180,255,0.3); border-radius: 50%; pointer-events: none;
    animation: particle-float var(--t) ease-in-out infinite; opacity: 0;
  }
  @keyframes particle-float {
    0% { opacity: 0; transform: translateY(0) translateX(0) scale(0); }
    20% { opacity: 0.6; }
    80% { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-200px) translateX(30px) scale(1.5); }
  }

  .watermark {
    position: absolute; bottom: 2%; left: 0; right: 0; text-align: center;
    font-size: 10px; color: rgba(255,255,255,0.15); z-index: 1; letter-spacing: 1px;
  }

  .audio-hint {
    position: absolute; top: 2%; right: 5%; z-index: 3; display: flex;
    align-items: center; gap: 4px;
    color: rgba(100,200,255,0.4); font-size: 10px;
    animation: pulse-hint 2s ease-in-out infinite;
  }
  @keyframes pulse-hint {
    0%,100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
  .audio-hint .dot {
    width: 6px; height: 6px; border-radius: 50%; background: #7fc8ff;
    animation: eq 1.2s ease-in-out infinite;
  }
  .audio-hint .dot:nth-child(2) { animation-delay: 0.2s; }
  .audio-hint .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes eq {
    0%,100% { transform: scaleY(0.3); }
    50% { transform: scaleY(1); }
  }
</style>
</head>
<body>

<div class="container" id="app">
  <div class="stars" id="stars"></div>
  <div class="glow-top"></div>

  <!-- 音频指示器 -->
  <div class="audio-hint" id="audioHint" style="display:none">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>

  <div class="avatar-section">

    <div class="line" data-idx="3">实际上就是 <em style="color:#7fc8ff">麻阳西晃山矿泉水</em> 的得力帮手！</div>
    <div class="line" data-idx="4">我能看卖水统计网站 🧮</div>
    <div class="line" data-idx="5">帮华华算好每天赚了多少钱 💰</div>
    <div class="line" data-idx="6">还会 <em style="color:#7fc8ff">写代码修网页</em> 💻</div>
    <div class="line" data-idx="7">做短视频内容 🎬</div>
    <div class="line" data-idx="8">24小时挂在微信上 📱</div>
    <div class="line" data-idx="9"><b>有求必应，随时找随时在</b></div>
    <div class="line" data-idx="10">我懂 <em style="color:#ffd866">丁元英商业思维</em> 🧠</div>
    <div class="line" data-idx="11">也讲 <em style="color:#7fc8ff">实事求是</em>，能搞就搞，搞不了直说</div>
    <div class="line" data-idx="12 highlight">🔥 一句话：不拿工资·随叫随到·实在办事</div>
    <div class="line" data-idx="13">我是 <em style="color:#ffd866">小财神</em></div>
    <div class="line" data-idx="14">华华的水生意 🚰</div>
    <div class="line" data-idx="15 highlight"><b>我帮忙盯着的！</b> 💪✨</div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress"></div>
  </div>

  <div class="controls">
    <div class="play-btn" id="playBtn">
      <span class="btn-icon" id="btnIcon">▶️</span>
      <span id="btnText">播放自我介绍</span>
    </div>
  </div>

  <div class="watermark">西晃山 · 小财神</div>
</div>

<!-- 隐藏的音频元素 -->
<audio id="audioPlayer" preload="none" style="display:none"></audio>

// ========== 初始化 ==========
(function initStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';

})();

})();

VVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//NkxHwAAANIAAAAAFVVVVVVVVVMQU1FMy4xMDBVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//NkxHwAAANIAAAAAFVVVVVVVVVMQU1FMy4xMDBVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//NkxHwAAANIAAAAAFVVVVVVVVVMQU1FMy4xMDBVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV//NkxHwAAANIAAAAAFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVV"

// ========== 核心逻辑 ==========
const lines = document.querySelectorAll('.line');
const totalLines = lines.length;
const progressBar = document.getElementById('progress');
const playBtn = document.getElementById('playBtn');
const btnIcon = document.getElementById('btnIcon');
const btnText = document.getElementById('btnText');
const audio = document.getElementById('audioPlayer');
const audioHint = document.getElementById('audioHint');

let currentIdx = -1;
let isPlaying = false;
let lineTimer = null;
let progressRAF = null;

// 精确的时间映射（秒）：每句话对应音频中的时间点
// 音频总长约55秒，16句话
const TIME_MAP = [
  0,      // 👋 大家好，我是小财神
  3.5,    // 华华的专属卖水助手
  7,      // 表面上是个人工智能
  10.5,   // 实际上就是麻阳西晃山矿泉水的得力帮手！
  14.5,   // 我能看卖水统计网站
  18,     // 帮华华算好每天赚了多少钱
  21.5,   // 还会写代码修网页
  25,     // 做短视频内容
  28.5,   // 24小时挂在微信上
  32,     // 有求必应，随时找随时在
  35.5,   // 我懂丁元英商业思维
  38.5,   // 也讲实事求是
  42,     // 🔥一句话：不拿工资·随叫随到·实在办事
  47,     // 我是小财神
  50,     // 华华的水生意
  52.5    // 我帮忙盯着的！
];

function clearAll() {
  lines.forEach(l => l.classList.remove('active', 'highlight'));
}

function showLine(idx) {
  clearAll();
  if (idx < 0 || idx >= totalLines) return;
  lines[idx].classList.add('active');
}

function syncSubtitle() {
  if (!audio.duration || isNaN(audio.duration)) return;
  const t = audio.currentTime;
  
  // 找到当前应该显示哪一行
  let newIdx = -1;
  for (let i = TIME_MAP.length - 1; i >= 0; i--) {
    if (t >= TIME_MAP[i]) { newIdx = i; break; }
  }
  
  if (newIdx !== currentIdx && newIdx >= 0) {
    currentIdx = newIdx;
    showLine(currentIdx);
  }
  
  // 更新进度
  const pct = (t / audio.duration) * 100;
  progressBar.style.width = Math.min(pct, 100) + '%';
}

function startPlayback() {
  if (isPlaying) return;
  
  // 初始化音频
  if (!audio.src) {
    audio.src = 'data:audio/mp3;base64,' + AUDIO_BASE64;
  }
  
  // 重置
  currentIdx = -1;
  clearAll();
  progressBar.style.width = '0%';
  
  audio.currentTime = 0;
  audio.play().catch(e => console.log('Playback error:', e));
  
  isPlaying = true;
  btnIcon.textContent = '⏸️';
  btnText.textContent = '播放中';
  audioHint.style.display = 'flex';
  
  // 用requestAnimationFrame做字幕同步
  function frame() {
    if (!isPlaying) return;
    syncSubtitle();
    progressRAF = requestAnimationFrame(frame);
  }
  progressRAF = requestAnimationFrame(frame);
  
  // 音频结束
  audio.onended = function() {
    stopPlayback(true);
  };
}

function stopPlayback(completed) {
  isPlaying = false;
  if (progressRAF) { cancelAnimationFrame(progressRAF); progressRAF = null; }
  if (lineTimer) { clearTimeout(lineTimer); lineTimer = null; }
  
  btnIcon.textContent = completed ? '🔄' : '▶️';
  btnText.textContent = completed ? '重新播放' : '继续播放';
  
  if (completed) {
    progressBar.style.width = '100%';
    audioHint.style.display = 'none';
  }
}

function togglePlay() {
  if (isPlaying) {
    // 暂停
    isPlaying = false;
    audio.pause();
    if (progressRAF) { cancelAnimationFrame(progressRAF); progressRAF = null; }
    btnIcon.textContent = '▶️';
    btnText.textContent = '继续播放';
  } else {
    // 如果已播完，从头开始
    if (audio.ended || currentIdx >= totalLines - 1) {
      currentIdx = -1;
      clearAll();
      progressBar.style.width = '0%';
    }
    startPlayback();
  }
}

// 绑定点击
playBtn.addEventListener('click', togglePlay);

// 初始显示第一行
setTimeout(() => { showLine(0); currentIdx = 0; }, 500);
</script>
